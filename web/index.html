<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Sil-Quest</title>
  <meta name="theme-color" content="#0c0f14">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Sil-Q">
  <link rel="icon" href="./icon.ico" sizes="any">
  <link rel="icon" href="./icon32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="./icon192.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div id="log" class="top-log">(message panel)</div>
      <div id="status">Loading WASM...</div>
    </header>

    <section class="layout">
      <div class="map-wrap">
        <div id="map-loading" class="map-loading" aria-live="polite">
          <div class="map-loading-card">
            <img
              src="./icon512.png"
              alt=""
              class="map-loading-logo"
              width="512"
              height="512"
            >
            <div id="map-loading-status" class="map-loading-status">Loading WASM...</div>
          </div>
        </div>
        <div class="map-stage">
          <canvas id="map" hidden></canvas>
        </div>
      </div>
      <div class="hud-strip">
        <button
          id="side-toggle"
          class="side-toggle"
          type="button"
          aria-controls="side-wrap"
          aria-expanded="false"
        >
          Stats
        </button>
        <div id="hud-bars" class="hud-bars">(mobile hud)</div>
      </div>
      <div id="action-fabs" class="action-fabs" hidden>
        <div id="adjacent-action-row" class="adjacent-action-row" hidden>
          <button
            class="action-fab action-fab-compact adjacent-action-fab"
            type="button"
            data-adj-dir="7"
            aria-label="North-west action"
            title="North-west action"
            hidden
          >
            <span class="action-fab-visual" aria-hidden="true"></span>
          </button>
          <button
            class="action-fab action-fab-compact adjacent-action-fab"
            type="button"
            data-adj-dir="8"
            aria-label="North action"
            title="North action"
            hidden
          >
            <span class="action-fab-visual" aria-hidden="true"></span>
          </button>
          <button
            class="action-fab action-fab-compact adjacent-action-fab"
            type="button"
            data-adj-dir="9"
            aria-label="North-east action"
            title="North-east action"
            hidden
          >
            <span class="action-fab-visual" aria-hidden="true"></span>
          </button>
          <button
            class="action-fab action-fab-compact adjacent-action-fab"
            type="button"
            data-adj-dir="4"
            aria-label="West action"
            title="West action"
            hidden
          >
            <span class="action-fab-visual" aria-hidden="true"></span>
          </button>
          <button
            class="action-fab action-fab-compact adjacent-action-fab"
            type="button"
            data-adj-dir="6"
            aria-label="East action"
            title="East action"
            hidden
          >
            <span class="action-fab-visual" aria-hidden="true"></span>
          </button>
          <button
            class="action-fab action-fab-compact adjacent-action-fab"
            type="button"
            data-adj-dir="1"
            aria-label="South-west action"
            title="South-west action"
            hidden
          >
            <span class="action-fab-visual" aria-hidden="true"></span>
          </button>
          <button
            class="action-fab action-fab-compact adjacent-action-fab"
            type="button"
            data-adj-dir="2"
            aria-label="South action"
            title="South action"
            hidden
          >
            <span class="action-fab-visual" aria-hidden="true"></span>
          </button>
          <button
            class="action-fab action-fab-compact adjacent-action-fab"
            type="button"
            data-adj-dir="3"
            aria-label="South-east action"
            title="South-east action"
            hidden
          >
            <span class="action-fab-visual" aria-hidden="true"></span>
          </button>
        </div>
        <button
          id="tile-action-fab"
          class="action-fab tile-action-fab"
          type="button"
          aria-label="Act here"
          title="Act here"
          hidden
        >
          <span
            id="tile-action-fab-visual"
            class="action-fab-visual"
            aria-hidden="true"
          ></span>
        </button>

        <div id="player-action-fabs" class="action-row">
          <button
            id="ranged-fab"
            class="action-fab ranged-fab"
            type="button"
            aria-label="Aim and fire"
            title="Aim and fire"
            hidden
          >
            <span
              id="ranged-fab-visual"
              class="action-fab-visual"
              aria-hidden="true"
            ></span>
          </button>
          <div id="song-fab-wrap" class="action-fab-stack" hidden>
            <button
              id="song-fab"
              class="action-fab song-fab"
              type="button"
              aria-label="Songs"
              title="Songs"
            >
              <img
                src="./assets/icon-song.png"
                alt=""
                class="action-fab-icon"
                aria-hidden="true"
              >
            </button>
            <span
              id="song-fab-label"
              class="action-fab-caption"
              aria-hidden="true"
              hidden
            ></span>
          </div>
          <button
            id="inventory-fab"
            class="action-fab inventory-fab"
            type="button"
            aria-label="Open inventory"
            title="Open inventory"
            hidden
          >
            <img
              src="./assets/icon-backpack.png"
              alt=""
              class="action-fab-icon"
              aria-hidden="true"
            >
          </button>
          <button
            id="yes-fab"
            class="action-fab yes-fab"
            type="button"
            aria-label="Yes"
            title="Yes"
            hidden
          >
            <img
              src="./assets/icon-y.png"
              alt=""
              class="action-fab-icon"
              aria-hidden="true"
            >
          </button>
          <button
            id="close-fab"
            class="action-fab close-fab"
            type="button"
            aria-label="Close"
            title="Close"
            hidden
          >
            <img
              src="./assets/icon-x.png"
              alt=""
              class="action-fab-icon"
              aria-hidden="true"
            >
          </button>
        </div>
      </div>
      <div id="side-backdrop" class="side-backdrop" hidden></div>
      <div id="side-wrap" class="side-wrap">
        <div id="side" class="panel">(side panel)</div>
      </div>
      <div id="overlay-modal" class="overlay"></div>
    </section>
  </main>

  <script>
    (() => {
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch((err) => {
            console.warn("Failed to register service worker:", err);
          });
        });
      }

      const loadScript = (src) => new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.onload = () => resolve();
        script.onerror = () => reject(new Error(`Failed to load ${src}`));
        document.body.appendChild(script);
      });

      loadScript("./helper.js")
        .then(() => loadScript("./app.js"))
        .then(() => loadScript("./lib/sil.js"))
        .catch((err) => {
          console.error(err.message);
        });
    })();
  </script>
</body>
</html>
