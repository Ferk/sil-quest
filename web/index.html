<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sil-Q Web Prototype</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div id="log" class="top-log">(message panel)</div>
      <div id="status">Loading WASM...</div>
    </header>

    <section class="layout">
      <div class="map-wrap">
        <div class="map-stage">
          <canvas id="map"></canvas>
        </div>
      </div>
      <div class="side-wrap">
        <div id="side" class="panel">(side panel)</div>
      </div>
      <div id="overlay-modal" class="overlay"></div>
    </section>
  </main>

  <script>
    (() => {
      const loadScript = (src) => new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.onload = () => resolve();
        script.onerror = () => reject(new Error(`Failed to load ${src}`));
        document.body.appendChild(script);
      });

      loadScript("./helper.js")
        .then(() => loadScript("./app.js"))
        .then(() => loadScript("./lib/sil.js"))
        .catch((err) => {
          console.error(err.message);
        });
    })();
  </script>
</body>
</html>
